<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>transport-game</title>
    <style>
      #error-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        overflow: auto;
        font-family: sans-serif;
        align-items: center;
        justify-content: center;
        padding: 32px;
        box-sizing: border-box;
      }
      #error-overlay.visible { display: flex; }
      #error-map-svg { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 0; }
      #error-card {
        position: relative;
        z-index: 1;
        background: rgba(255,255,255,0.88);
        backdrop-filter: blur(6px);
        border-radius: 16px;
        padding: 32px 36px;
        max-width: 640px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(34,48,36,0.18);
        border: 1px solid rgba(201,194,179,0.6);
      }
      #error-card .icon { font-size: 36px; margin-bottom: 8px; }
      #error-card h1 { color: #b42318; font-size: 22px; margin: 0 0 6px; font-weight: 800; }
      #error-card .subtitle { color: #56635a; font-size: 13px; margin: 0 0 16px; }
      #error-card .error-block { background: #fdf0ec; border: 1px solid #e2b8b0; border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; }
      #error-card .error-msg { color: #7c1c14; font-weight: 700; font-size: 14px; margin-bottom: 4px; }
      #error-card .error-stack { color: #56635a; font-size: 11px; white-space: pre-wrap; word-break: break-word; font-family: monospace; margin: 0; }
      #error-card .btn-primary { padding: 9px 20px; background: #223024; color: #e8efe6; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin-right: 8px; }
      #error-card .btn-secondary { padding: 9px 20px; background: transparent; color: #223024; border: 1px solid #c9c2b3; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    </style>
    <script>
      (function() {
        var overlay = null;
        var errors = [];

        function getOverlay() {
          if (!overlay) {
            overlay = document.getElementById('error-overlay');
          }
          return overlay;
        }

        function renderErrors() {
          var el = getOverlay();
          if (!el) return;
          el.classList.add('visible');
          var card = document.getElementById('error-card');
          if (!card) return;
          card.innerHTML =
            '<div class="icon">🚂💥</div>' +
            '<h1>Application Error</h1>' +
            '<p class="subtitle">Something went wrong before the app could load. The error details are below.</p>' +
            errors.map(function(e) {
              return '<div class="error-block">' +
                '<div class="error-msg">' + escapeHtml(e.message) + '</div>' +
                (e.stack ? '<pre class="error-stack">' + escapeHtml(e.stack) + '</pre>' : '') +
                (e.source ? '<pre class="error-stack">at ' + escapeHtml(e.source) + ':' + e.lineno + ':' + e.colno + '</pre>' : '') +
                '</div>';
            }).join('') +
            '<button class="btn-primary" onclick="location.reload()">Reload page</button>' +
            '<button class="btn-secondary" onclick="document.getElementById(\'error-overlay\').classList.remove(\'visible\')">Dismiss</button>';
        }

        function escapeHtml(str) {
          return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
        }

        window.addEventListener('error', function(e) {
          var msg = e.message || '';
          // Vite HMR stale module cache — the ?t= timestamp in the module URL is a dev-server artifact.
          // Auto-reload rather than showing an error the user can't do anything about.
          if (msg.indexOf('does not provide an export named') !== -1 ||
              msg.indexOf('Failed to fetch dynamically imported module') !== -1) {
            location.reload();
            return;
          }
          errors.push({ message: e.message, stack: e.error && e.error.stack, source: e.filename, lineno: e.lineno, colno: e.colno });
          renderErrors();
        });

        window.addEventListener('unhandledrejection', function(e) {
          var err = e.reason;
          var msg = err && err.message ? err.message : String(err || '');
          // Same Vite HMR stale module guard for promise-based import() errors.
          if (msg.indexOf('does not provide an export named') !== -1 ||
              msg.indexOf('Failed to fetch dynamically imported module') !== -1) {
            location.reload();
            return;
          }
          errors.push({ message: msg, stack: err && err.stack });
          renderErrors();
        });
      })();
    </script>
